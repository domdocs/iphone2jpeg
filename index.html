<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIC to JPEG Converter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 1.5rem;
            color: #1d1d1f;
        }

        .upload-area {
            border: 2px dashed #0071e3;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background-color: #f0f0f0;
        }

        .upload-area.dragover {
            background-color: #e8f0fe;
            border-color: #0071e3;
        }

        #file-input {
            display: none;
        }

        .button {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #0077ed;
        }

        .button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1rem;
            color: #666;
        }

        .error {
            color: #ff3b30;
        }

        .success {
            color: #34c759;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HEIC to JPEG Converter</h1>
        <form id="upload-form" action="/convert" method="post" enctype="multipart/form-data">
            <div class="upload-area" id="drop-area">
                <p>Drag and drop your HEIC file here<br>or click to select</p>
                <input type="file" id="file-input" name="file" accept=".heic,.heif">
            </div>
            <button type="submit" class="button" id="convert-btn" disabled>Convert to JPEG</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const convertBtn = document.getElementById('convert-btn');
        const status = document.getElementById('status');
        const form = document.getElementById('upload-form');

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        // Highlight drop area when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });

        // Handle dropped files
        dropArea.addEventListener('drop', handleDrop, false);
        dropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function highlight(e) {
            dropArea.classList.add('dragover');
        }

        function unhighlight(e) {
            dropArea.classList.remove('dragover');
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles({ target: { files: files } });
        }

        function handleFiles(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif')) {
                    convertBtn.disabled = false;
                    status.textContent = `Selected: ${file.name}`;
                    status.className = '';
                } else {
                    status.textContent = 'Please select a HEIC/HEIF file';
                    status.className = 'error';
                    convertBtn.disabled = true;
                }
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            try {
                convertBtn.disabled = true;
                status.textContent = 'Converting...';
                status.className = '';
                
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileInput.files[0].name.replace(/\.(heic|heif)$/i, '.jpg');
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    
                    status.textContent = 'Conversion successful!';
                    status.className = 'success';
                } else {
                    const error = await response.text();
                    throw new Error(error);
                }
            } catch (error) {
                status.textContent = `Error: ${error.message}`;
                status.className = 'error';
            } finally {
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
